<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kira's English Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body { 
      margin: 0; 
      padding: 0; 
      background-color: transparent; 
      font-family: 'Montserrat', sans-serif; 
      color: white; 
      overflow-x: hidden;
    }
    
    .main-container { 
      padding: 15px; 
      width: 100%; 
      max-width: 1600px; /* Expanded layout max width for side-by-side presentation */
      margin: 0 auto; 
      box-sizing: border-box; 
    }

    /* --- SIDE-BY-SIDE RESPONSIVE FLEX CONTAINER --- */
    .split-layout {
      display: flex;
      flex-direction: row;
      gap: 20px;
      width: 100%;
      align-items: flex-start;
    }

    .game-panel {
      flex: 1;
      min-width: 0; /* Prevents overflow issues within the flexbox system */
    }

    /* Fallback stack display mode for mobile systems */
    @media (max-width: 1024px) {
      .split-layout {
        flex-direction: column;
        gap: 30px;
      }
    }
    /* ----------------------------------------------- */

    .action-card {
      background: #000;
      border-left: 6px solid #D30000;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 15px;
      padding-bottom: 10px;
    }

    .header-title-container { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      border-bottom: 2.5px solid #D30000; 
      padding-bottom: 8px; 
      width: 100%; 
      justify-content: space-between; 
    }
    
    .logo-bracket {  
      width: 42px; 
      height: 42px; 
      background: #000; 
      border-left: 3.5px solid #D30000; 
      border-radius: 5px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding-left: 4px; 
      box-sizing: border-box; 
    }
    
    .logo-bracket img { 
      width: 34px; 
      height: 34px; 
      border-radius: 50%; 
      object-fit: cover; 
    }
    
    .header-left-group { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }
    
    .header-left-group h2 { 
      color: #ffffff; 
      font-size: 1rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin: 0; 
    }

    #counter {
      color: #888;
      font-weight: 700;
      font-size: 0.9rem;
    }

    select { 
      background: #111; 
      color: #fff; 
      border: 1.5px solid #D30000; 
      padding: 6px 10px; 
      border-radius: 6px; 
      font-family: 'Montserrat', sans-serif; 
      cursor: pointer; 
      font-weight: 700; 
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus {
      border-color: #ff3333;
    }

    .exercise-block {
      background: #111;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid #222;
      box-sizing: border-box;
      min-height: 480px; /* Uniform minimum sizing helper across games */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* --- GAME 1 SPECIFIC STYLES (Sentence Builder) --- */
    .progress-container { 
      width: 100%; 
      background: #222; 
      height: 4px; 
      border-radius: 2px; 
      margin-bottom: 20px; 
      overflow: hidden; 
    }
    
    .progress-bar { 
      height: 100%; 
      background: #D30000; 
      width: 0%; 
      transition: width 0.4s ease; 
    }

    .spanish-hint { 
      font-size: 1rem; 
      color: #fff; 
      margin-bottom: 15px; 
      font-weight: 700; 
      background: #000; 
      padding: 15px; 
      border-radius: 8px; 
      border: 1px solid #222;
      text-align: center; 
      line-height: 1.4;
    }

    .drop-zone {
      min-height: 65px; 
      width: 100%; 
      border: 2px dashed #333; 
      border-radius: 8px;
      margin-bottom: 15px; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      flex-wrap: wrap; 
      gap: 10px; 
      padding: 12px; 
      background: #050505; 
      box-sizing: border-box;
    }

    .drop-zone.is-correct { 
      border: 2px solid #00FF00 !important; 
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.25); 
    }

    .word-bank { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      align-items: center;
      gap: 10px; 
      margin-bottom: 10px; 
      width: 100%; 
      min-height: 50px; 
      padding: 8px;
      box-sizing: border-box;
    }

    .tile {
      background: #000; 
      border: 1px solid #444; 
      padding: 10px 16px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 700; 
      color: #fff; 
      font-size: 0.95rem;
      user-select: none; 
      transition: all 0.2s; 
      text-align: center;
      display: flex; 
      align-items: center; 
      justify-content: center;
      touch-action: none;
    }
    
    .tile:hover:not(.dragging) {
      border-color: #888;
      background: #050505;
    }
     
    .tile.dragging { opacity: 0.4; transform: scale(0.9); }
    .drop-zone .tile { border: 1.5px solid #D30000; background: #000; cursor: grab; }
    .is-correct .tile { border-color: #00FF00 !important; color: #00FF00 !important; cursor: default; }

    .feedback { 
      margin-bottom: 15px; 
      font-weight: 700; 
      font-size: 0.85rem; 
      min-height: 20px; 
      width: 100%; 
      text-align: center; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .correct-text { color: #00FF00; }
    .wrong-text { color: #ff4a4a; }

    .button-group { display: flex; gap: 10px; width: 100%; margin-top: auto; }
     
    .btn {
      padding: 14px; 
      border-radius: 8px; 
      font-weight: 700; 
      cursor: pointer;
      text-transform: uppercase; 
      border: none; 
      font-family: 'Montserrat', sans-serif; 
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    
    .btn-check { background: #D30000; color: white; flex: 2; }
    .btn-check:hover { background: #b30000; }
    .btn-next { background: #00FF00; color: #000; flex: 2; display: none; }
    .btn-next:hover { background: #00cc00; }
    .btn-reset-builder { background: #222; color: #aaa; flex: 1; border: 1px solid #333; }
    .btn-reset-builder:hover { background: #333; color: #fff; }
    .btn-perfect { background: #00FF00 !important; color: #000 !important; }

    .finish-screen { text-align: center; padding: 20px 10px; width: 100%; animation: fadeIn 0.5s; margin-auto: auto; }
    .finish-screen h3 { font-size: 1.4rem; font-weight: 700; margin: 0 0 10px 0; }
    
    .score-circle {
      display: inline-block; 
      width: 90px; 
      height: 90px; 
      border: 4px solid #00FF00;
      border-radius: 50%; 
      line-height: 90px; 
      font-size: 2rem; 
      font-weight: 700;
      margin: 20px 0; 
      color: #00FF00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    }

    /* --- GAME 2 SPECIFIC STYLES (Verb Matcher) --- */
    .instruction-text { 
      color: #888; 
      font-size: 0.85rem; 
      margin: 0 0 20px 0; 
      text-align: center; 
      font-style: italic; 
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .game-area { 
      display: flex; 
      gap: 15px; 
      justify-content: center; 
      width: 100%;
    }
    
    .column { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }

    .word-btn { 
      background: #000; 
      border: 1px solid #333; 
      padding: 12px 8px; 
      color: #fff; 
      border-radius: 8px; 
      cursor: pointer; 
      text-align: center; 
      font-weight: 700; 
      font-size: 0.95rem; 
      user-select: none; 
      border-bottom: 3px solid #222; 
      box-sizing: border-box; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 52px; 
      transition: all 0.2s; 
      position: relative; 
    }
    
    .word-btn:hover:not(.selected):not(.revealed-ph):not(.vanished) { border-color: #555; }
    .word-btn.selected { border-color: #D30000; background: #400000; border-bottom-color: #D30000; }
    
    .word-btn.revealed-ph { 
      background: #002b0c !important; 
      border-color: #00FF00 !important; 
      color: #00FF00 !important; 
      font-size: 0.9rem; 
      font-style: italic; 
      font-weight: 700; 
      cursor: default; 
      border-bottom: 3px solid #00FF00; 
    }
    
    .word-btn.vanished { visibility: hidden; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .word-btn.error { border-color: #ff4a4a; background: #421b1b; animation: shake 0.3s; }
    
    @keyframes shake { 
      0%, 100% { transform: translateX(0); } 
      25% { transform: translateX(-4px); } 
      75% { transform: translateX(4px); } 
    }

    .win-message { 
      display: none; 
      text-align: center; 
      padding: 20px 10px; 
      animation: fadeIn 0.5s;
      margin-top: auto;
      margin-bottom: auto;
    }
    
    .win-message h3 { 
      color: #00FF00; 
      font-size: 1.6rem; 
      font-weight: 700;
      margin: 0 0 15px 0; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }
    
    .btn-reset-matcher { 
      background: #D30000; 
      color: #fff; 
      border: none; 
      padding: 14px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 700; 
      text-transform: uppercase; 
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem; 
      letter-spacing: 0.5px;
      width: 100%; 
      transition: background 0.2s;
    }
    .btn-reset-matcher:hover { background: #b30000; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Universal Media Query Tuning adjustments */
    @media (max-width: 1200px) {
      .action-card { padding: 20px; }
      .tile { padding: 8px 12px; font-size: 0.85rem; }
      .word-btn { font-size: 0.85rem; min-height: 48px; }
    }

    @media (max-width: 768px) {
      .action-card { padding: 15px; border-left-width: 4px; }
      .exercise-block { padding: 15px; min-height: auto; }
      .logo-bracket { width: 36px; height: 36px; }
      .logo-bracket img { width: 28px; height: 28px; }
      .header-left-group h2 { font-size: 0.85rem; }
      #counter { font-size: 0.8rem; }
      select { padding: 5px 8px; font-size: 0.75rem; border-radius: 5px; }
      .spanish-hint { font-size: 0.9rem; padding: 12px; margin-bottom: 12px; }
      .drop-zone { min-height: 55px; padding: 8px; gap: 8px; margin-bottom: 12px; }
      .word-bank { min-height: 44px; gap: 8px; }
      .tile { padding: 8px 10px; font-size: 0.8rem; border-radius: 6px; }
      .btn, .btn-reset-matcher { padding: 12px; font-size: 0.75rem; border-radius: 6px; }
      .score-circle { width: 75px; height: 75px; line-height: 75px; font-size: 1.6rem; }
      .instruction-text { font-size: 0.75rem; margin-bottom: 15px; }
      .game-area { gap: 10px; }
      .column { gap: 8px; }
      .word-btn { padding: 10px 4px; font-size: 0.8rem; min-height: 44px; border-radius: 6px; border-bottom-width: 2px; }
      .word-btn.revealed-ph { font-size: 0.75rem; border-bottom-width: 2px; }
      .win-message h3 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="main-container">
  <div class="split-layout">
    
    <div class="game-panel">
      <div class="action-card" id="quiz-ui">
        </div>
    </div>

    <div class="game-panel">
      <div class="action-card">
        <div class="section-header">
          <div class="header-title-container">
            <div class="header-left-group">
              <div class="logo-bracket"><img src="https://drive.google.com/thumbnail?id=1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" alt="Kira"></div>
              <h2>VERB MATCHER</h2>
            </div>
            <select id="category-select" onchange="resetCategoryAndInit()">
              <option value="rutina">Rutina Diaria</option>
              <option value="comunicacion">Comunicación</option>
              <option value="movimiento">Movimiento</option>
              <option value="mente">Pensar y Sentir</option>
              <option value="cocina">En la Cocina</option>
              <option value="estudio">Estudio y Trabajo</option>
              <option value="limpieza">Limpieza y Hogar</option>
              <option value="social">Vida Social</option>
              <option value="opuestos">Verbos Opuestos</option>
              <option value="basicos">Acciones Básicas</option>
            </select>
          </div>
        </div>
        
        <div class="exercise-block">
          <p class="instruction-text" id="instr">SELECCIONA LA CATEGORÍA DE VERBOS</p>
          
          <div id="game-ui">
            <div class="game-area">
              <div class="column" id="col-en"></div>
              <div class="column" id="col-es"></div>
            </div>
          </div>
          
          <div id="win-ui" class="win-message">
            <h3>EXCELLENT!</h3>
            <button class="btn-reset-matcher" onclick="initGame2()">NEXT SET</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  /* ========================================================================
     GAME 1 LOGIC: Sentence Builder
     ======================================================================== */
  const poolData = [
    { q: "Yo necesito comida.", a: ["I", "need", "food"] },
    { q: "Yo quiero dinero.", a: ["I", "want", "money"] },
    { q: "Tú y Danny beben cerveza.", a: ["You", "and", "Danny", "drink", "beer"] },
    { q: "Jenna y yo amamos literatura.", a: ["Jenna", "and", "I", "love", "literature"] },
    { q: "Jenna y Danny temen alturas.", a: ["Jenna", "and", "Danny", "fear", "heights"] },
    { q: "Yo amo invierno.", a: ["I", "love", "winter"] },
    { q: "Tú necesitas equipo.", a: ["You", "need", "equipment"] },
    { q: "Tú y yo amamos ron.", a: ["You", "and", "I", "love", "rum"] },
    { q: "Yo traigo pizza.", a: ["I", "bring", "pizza"] },
    { q: "Tú vendes boletos.", a: ["You", "sell", "tickets"] },
    { q: "Él compra casas.", a: ["He", "buys", "houses"] },
    { q: "Nosotros bebemos agua.", a: ["We", "drink", "water"] },
    { q: "Ella tiene gatos.", a: ["She", "has", "cats"] },
    { q: "Ellos estudian inglés.", a: ["They", "study", "English"] },
    { q: "Tú hablas inglés.", a: ["You", "speak", "English"] },
    { q: "Yo leo libros.", a: ["I", "read", "books"] },
    { q: "Perros corren.", a: ["Dogs", "run"] },
    { q: "Nosotros vemos televisión.", a: ["We", "watch", "TV"] },
    { q: "Ella cocina pasta.", a: ["She", "cooks", "pasta"] },
    { q: "Tú escribes cartas.", a: ["You", "write", "letters"] }
  ];

  let currentIndex = 0, score = 0, hasErrored = false, randomizedQuiz = [];
  const LIMIT = 10;

  function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

  function startQuiz() {
    randomizedQuiz = shuffle([...poolData]).slice(0, LIMIT);
    currentIndex = 0; score = 0;
    renderSkeleton();
    loadQuestion();
  }

  function renderSkeleton() {
    document.getElementById('quiz-ui').innerHTML = `
      <div class="section-header">
        <div class="header-title-container">
          <div class="header-left-group">
            <div class="logo-bracket"><img src="https://drive.google.com/thumbnail?id=1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" alt="Kira"></div>
            <h2>Sentence Builder</h2>
          </div>
          <span id="counter">1/${LIMIT}</span>
        </div>
      </div>
      <div class="exercise-block">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="spanish-hint" id="hint-es"></div>
        <div class="drop-zone" id="drop-zone"></div>
        <div class="word-bank" id="word-bank"></div>
        <div id="feedback" class="feedback"></div>
        <div class="button-group">
          <button class="btn btn-reset-builder" onclick="loadQuestion()">Reset</button>
          <button class="btn btn-check" id="check-btn" onclick="checkSentence()">Check</button>
          <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
        </div>
      </div>
    `;
    initDragEvents();
  }

  function loadQuestion() {
    hasErrored = false;
    const data = randomizedQuiz[currentIndex];
    document.getElementById('counter').innerText = `${currentIndex + 1}/${LIMIT}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / LIMIT) * 100}%`;
    document.getElementById('hint-es').innerText = data.q;
    document.getElementById('feedback').innerText = '';
    const dropZone = document.getElementById('drop-zone');
    dropZone.innerHTML = '';
    dropZone.classList.remove('is-correct');
    document.getElementById('check-btn').style.display = "block";
    document.getElementById('next-btn').style.display = "none";
    const bank = document.getElementById('word-bank');
    bank.innerHTML = '';
    shuffle([...data.a]).forEach(word => createTile(word, bank));
  }

  function createTile(word, container) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.innerText = word;
    tile.draggable = true;
    tile.onclick = () => {
      if(document.getElementById('drop-zone').classList.contains('is-correct')) return;
      const dropZone = document.getElementById('drop-zone');
      const bank = document.getElementById('word-bank');
      (tile.parentElement === bank ? dropZone : bank).appendChild(tile);
      document.getElementById('feedback').innerText = '';
    };
    tile.addEventListener('dragstart', () => tile.classList.add('dragging'));
    tile.addEventListener('dragend', () => tile.classList.remove('dragging'));
    container.appendChild(tile);
  }

  function initDragEvents() {
    const containers = [document.getElementById('drop-zone'), document.getElementById('word-bank')];
    containers.forEach(container => {
      container.addEventListener('dragover', e => {
        if(document.getElementById('drop-zone').classList.contains('is-correct')) return;
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        const afterElement = getDragAfterElement(container, e.clientX);
        if (afterElement == null) container.appendChild(dragging);
        else container.insertBefore(dragging, afterElement);
      });
    });
  }

  function getDragAfterElement(container, x) {
    const draggableElements = [...container.querySelectorAll('.tile:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = x - box.left - box.width / 2;
      if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
      else return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function checkSentence() {
    const data = randomizedQuiz[currentIndex];
    const userWords = [...document.getElementById('drop-zone').querySelectorAll('.tile')].map(t => t.innerText);
    const feedback = document.getElementById('feedback');
    if (userWords.join(' ') === data.a.join(' ')) {
      if (!hasErrored) score++;
      feedback.className = 'feedback correct-text';
      feedback.innerText = "¡CORRECTO!";
      document.getElementById('drop-zone').classList.add('is-correct');
      document.getElementById('check-btn').style.display = "none";
      document.getElementById('next-btn').style.display = "block";
      document.querySelectorAll('.tile').forEach(t => t.draggable = false);
    } else {
      hasErrored = true;
      feedback.className = 'feedback wrong-text';
      feedback.innerText = userWords.length === 0 ? "Selecciona palabras" : "Orden incorrecto";
    }
  }

  function nextQuestion() {
    currentIndex++;
    currentIndex < randomizedQuiz.length ? loadQuestion() : finishGame();
  }

  function finishGame() {
    const isPerfect = score === LIMIT;
    document.getElementById('quiz-ui').innerHTML = `
      <div class="section-header">
        <div class="header-title-container">
          <div class="header-left-group">
            <div class="logo-bracket"><img src="https://drive.google.com/thumbnail?id=1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" alt="Kira"></div>
            <h2>Sentence Builder</h2>
          </div>
          <span id="counter">${LIMIT}/${LIMIT}</span>
        </div>
      </div>
      <div class="exercise-block">
        <div class="finish-screen">
          <h3 style="margin:0; color:#ffc107;">¡COMPLETADO!</h3>
          <div class="score-circle">${score}/${LIMIT}</div>
          <p style="font-size:0.9rem; color:#aaa; margin: 0 0 20px 0;">${isPerfect ? "¡Puntaje Perfecto!" : "Sigue practicando."}</p>
          <button class="btn btn-check ${isPerfect ? 'btn-perfect' : ''}" style="width:100%" onclick="startQuiz()">REINTENTAR</button>
        </div>
      </div>`;
  }

  /* ========================================================================
     GAME 2 LOGIC: Verb Matcher
     ======================================================================== */
  const vocabulary = {
    rutina: [
      {en: "Wake up", es: "Despertarse", ph: "/weɪk ʌp/"}, {en: "Get up", es: "Levantarse", ph: "/ɡet ʌp/"}, {en: "Shower", es: "Ducharse", ph: "/ˈʃaʊ.ər/"}, {en: "Brush", es: "Cepillarse", ph: "/brʌʃ/"}, {en: "Shave", es: "Afeitarse", ph: "/ʃeɪv/"}, {en: "Dress", es: "Vestirse", ph: "/dres/"},

  let seenIndices = {}; 
  let selectedEn = null;
  let selectedEs = null;
  let matchesFound = 0;
  let currentMatchesRequired = 6;

  function resetCategoryAndInit() {
    const cat = document.getElementById('category-select').value;
    seenIndices[cat] = [];
    initGame2();
  }

  function initGame2() {
    const cat = document.getElementById('category-select').value;
    const fullList = vocabulary[cat];
    if (!seenIndices[cat]) seenIndices[cat] = [];
    let available = fullList.filter((_, index) => !seenIndices[cat].includes(index));
    if (available.length < 3) { seenIndices[cat] = []; available = fullList; }

    currentMatchesRequired = Math.min(available.length, 6);
    const roundData = available.sort(() => 0.5 - Math.random()).slice(0, currentMatchesRequired);

    roundData.forEach(item => {
      const idx = fullList.findIndex(f => f.en === item.en);
      seenIndices[cat].push(idx);
    });

    const enWords = [...roundData].sort(() => 0.5 - Math.random());
    const esWords = [...roundData].sort(() => 0.5 - Math.random());

    document.getElementById('col-en').innerHTML = '';
    document.getElementById('col-es').innerHTML = '';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('win-ui').style.display = 'none';
    
    selectedEn = null; selectedEs = null; matchesFound = 0;
    enWords.forEach(item => createBtn(item, 'en', 'col-en'));
    esWords.forEach(item => createBtn(item, 'es', 'col-es'));
  }

  function createBtn(item, type, colId) {
    const btn = document.createElement('div');
    btn.className = 'word-btn';
    btn.innerText = type === 'en' ? item.en : item.es;
    btn.dataset.value = type === 'en' ? item.en : item.es;
    btn.dataset.pair = type === 'en' ? item.es : item.en;
    btn.dataset.phonetic = item.ph;
    btn.onclick = () => handleSelect(btn, type);
    document.getElementById(colId).appendChild(btn);
  }

  function handleSelect(btn, type) {
    if (btn.classList.contains('revealed-ph') || btn.classList.contains('vanished') || btn.classList.contains('selected')) return;
    
    if (type === 'en') { 
      if (selectedEn) selectedEn.classList.remove('selected'); 
      selectedEn = btn; 
    } else { 
      if (selectedEs) selectedEs.classList.remove('selected'); 
      selectedEs = btn; 
    }
    btn.classList.add('selected');

    if (selectedEn && selectedEs) {
      if (selectedEn.dataset.pair === selectedEs.dataset.value) {
        const sEn = selectedEn; const sEs = selectedEs;
        selectedEn = null; selectedEs = null;
        sEn.innerText = sEn.dataset.phonetic;
        sEn.classList.remove('selected');
        sEn.classList.add('revealed-ph');
        sEs.classList.add('vanished');
        matchesFound++;
        if (matchesFound === currentMatchesRequired) setTimeout(showWin2, 4000);
      } else {
        const tEn = selectedEn; const tEs = selectedEs;
        selectedEn = null; selectedEs = null;
        tEn.classList.add('error'); tEs.classList.add('error');
        setTimeout(() => { tEn.classList.remove('selected', 'error'); tEs.classList.remove('selected', 'error'); }, 400);
      }
    }
  }

  function showWin2() {
    document.getElementById('game-ui').style.display = 'none';
    document.getElementById('win-ui').style.display = 'block';
  }

  /* ========================================================================
     MASTER INITIALIZER
     ======================================================================== */
  window.addEventListener('DOMContentLoaded', () => {
    startQuiz(); // Fire Game 1 Engine Loop
    initGame2();  // Fire Game 2 Engine Loop
  });
</script>
</body>
</html>
